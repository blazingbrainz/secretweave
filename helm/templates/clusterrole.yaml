apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "secretweave.fullname" . }}
  labels:
    {{- include "secretweave.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    # watch is required: SecretWeave runs a cluster-scoped namespace informer
    # to seed annotated Secrets into newly created namespaces immediately,
    # without waiting for the next periodic sync tick.
    verbs: ["get", "list", "watch"]
